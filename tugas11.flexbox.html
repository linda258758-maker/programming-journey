<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>

    <style>
        .container{
            width: 1400px;
            border: 10px solid blue;
            margin: 30px;
            padding: 5px;
            display: flex;
            flex-direction: wrap;
            justify-content: flex-start;

        }
        .container img{
            width:100px;
            height:100px;
            margin:2px;
            padding: 15px;
        }
        h1{
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Galeri Saya</h1>
    <div class="container">
        <img src="logo.jpg">
        <img src="logo.jpg">
        <img src="logo.jpg">
        <img src="logo.jpg">
        <img src="logo.jpg">
        <img src="logo.jpg">
        <img src="logo.jpg">
        <img src="logo.jpg">
        <img src="logo.jpg">
        <img src="logo.jpg">
    </div>
</body>
</html>
