<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Align</title>
    <style>
        header {
            text-align: center;
        }

        .text-left {
            text-align: left;
        }

        .text-center {
            text-align: center;
        }

        .text-right {
            text-align: right;
        }

        .text-justify {
            text-align: justify;
        }

    </style>
</head>
<body>
    <header>Contoh Perataan Teks</header>
    <div class="text-left">
     ENHYPEN
    </div>
    <div class=" text-center">
     CORTIS
    </div>
    <div class="text-right">
     NCT DREAM
    </div>
    <div class="text-justify">
     BLACKPINK
    </div>
</body>
</html>
