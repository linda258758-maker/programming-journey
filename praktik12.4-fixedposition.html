<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Position</title>
     <style>
        body{
            height: 2000px;
        }
        div{
            width: 200px;
            height: 200px;
        }
        .satu{
            background-color: #a7bc91;
        }
        .dua{
            background-color: #91a5cb;
            position: fixed;
            top: 10px;
            left: 10px;
        }
        .tiga{
            background-color: #b6c4df;
        }
    </style>
</head>
<body>
     <div class="satu"></div>
    <div class="dua"></div>
    <div class="tiga"></div>
</body>
</html>
