<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Spacing</title>
    <style>
        h1 {
            letter-spacing: -2px;
            word-spacing: 4px;
        }
        .small {
            font-size: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .line-hight {
            line-height: 1.6;
        }
        .indent {
            text-indent: 2em;
        }
        .nowrap {
            white-space: break-sspaces;
        }
    </style>
</head>
